name: Deploy to EC2

on:
  push: 
    branches:
      - master

jobs:
  deploy:
    if: github.repository == 'globalgates01/globalgates'
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        include:
          - name: EC2_HOST1
          - name: EC2_HOST2

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set HOST env var from secrets
      run: echo "HOST=${{ secrets[matrix.name] }}" >> $GITHUB_ENV

    - name: Debug EC2_HOST
      run: echo "EC2_HOST is ${{ secrets.EC2_HOST }}"

    - name: Set up SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H $HOST >> ~/.ssh/known_hosts

    - name: Copy project to EC2
      run: |
        rsync -avz -e "ssh -i ~/.ssh/id_rsa" . ${{ secrets.EC2_USER }}@$HOST:/home/ubuntu/app

    - name: Build & Run Docker on EC2
      run: |
        ssh -i ~/.ssh/id_rsa ${{ secrets.EC2_USER }}@$HOST << EOF
          cd /home/ubuntu/app
          docker stop app || true
          docker rm app || true
          docker rmi app || true
          docker build --build-arg "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
            --build-arg "PSQL_PORT=${{ secrets.PSQL_PORT }}" \
            --build-arg "PSQL_DATABASE=${{ secrets.PSQL_DATABASE }}" \
            --build-arg "PSQL_USERNAME=${{ secrets.PSQL_USERNAME }}" \
            --build-arg "PSQL_PASSWORD=${{ secrets.PSQL_PASSWORD }}" \
            --build-arg "REDIS_PORT=${{ secrets.REDIS_PORT }}" \
            --build-arg "EC2_HOST=${{ secrets.EC2_HOST }}" \
            --build-arg "AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }}" \
            --build-arg "AWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }}" \
            --build-arg "AWS_BUCKET_NAME=${{ secrets.AWS_BUCKET_NAME }}" \
            --build-arg "AWS_REGION=${{ secrets.AWS_REGION }}" \
            --build-arg "KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }}" \
            --build-arg "KAKAO_CLIENT_SECRET=${{ secrets.KAKAO_CLIENT_SECRET }}" \
            --build-arg "NAVER_CLIENT_ID=${{ secrets.NAVER_CLIENT_ID }}" \
            --build-arg "NAVER_CLIENT_SECRET=${{ secrets.NAVER_CLIENT_SECRET }}" \
          -t app .
          docker run -d -p 80:10000 --name app \
            --add-host=host.docker.internal:host-gateway \
            --env "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
            --env "PSQL_PORT=${{ secrets.PSQL_PORT }}" \
            --env "PSQL_DATABASE=${{ secrets.PSQL_DATABASE }}" \
            --env "PSQL_USERNAME=${{ secrets.PSQL_USERNAME }}" \
            --env "PSQL_PASSWORD=${{ secrets.PSQL_PASSWORD }}" \
            --env "REDIS_PORT=${{ secrets.REDIS_PORT }}" \
            --env "RABBITMQ_HOST=${{ secrets.EC2_HOST1 }}" \
            --env "OAUTH_BASE_URL=https://globalgates.store" \
            --env "AI_FASTAPI_BASE_URL=${{ secrets.AI_FASTAPI_BASE_URL || 'http://host.docker.internal:8000' }}" \
            --env "EC2_HOST=${{ secrets.EC2_HOST }}" \
            --env "AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }}" \
            --env "AWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }}" \
            --env "AWS_BUCKET_NAME=${{ secrets.AWS_BUCKET_NAME }}" \
            --env "AWS_REGION=${{ secrets.AWS_REGION }}" \
            --env "KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }}" \
            --env "KAKAO_CLIENT_SECRET=${{ secrets.KAKAO_CLIENT_SECRET }}" \
            --env "NAVER_CLIENT_ID=${{ secrets.NAVER_CLIENT_ID }}" \
            --env "NAVER_CLIENT_SECRET=${{ secrets.NAVER_CLIENT_SECRET }}" \
            app
        EOF

    - name: Clean up dangling images
      if: success()
      run: |
        ssh -i ~/.ssh/id_rsa ${{ secrets.EC2_USER }}@$HOST << 'EOF'
          docker image prune -f
          docker container prune -f  
        EOF
